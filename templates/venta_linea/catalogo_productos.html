{% extends "layout/layout.html" %}
{% block container %}

<section>
    <div class="w-full max-w-6xl mx-auto py-12 px-4 border-b-1 border-grey-50/30">

        <div class="flex justify-center mb-10">
            <h2 class="text-center text-4xl font-light text-[#814c59] tracking-wide uppercase">
                Nuestros Productos
            </h2>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">

            {% for producto in productos %}
            <div class="flex flex-col items-center text-center group {{ 'opacity-50' if producto.disponible_stock == 0 }}">

                <div class="overflow-hidden rounded-lg shadow-md w-full relative">
                    {% if producto.disponible_stock == 0 %}
                    <div class="absolute inset-0 z-10 flex items-center justify-center bg-black/10 backdrop-blur-[1px]">
                        <span class="bg-[#b39aa8] text-white text-xs font-bold px-4 py-1 rounded-full uppercase tracking-widest">AGOTADO</span>
                    </div>
                    {% endif %}
                    <img 
                        src="{{ producto.imagen if producto.imagen else url_for('static', filename='img/default.png') }}" 
                        alt="{{ producto.nombre }}"
                        class="w-full h-72 object-cover hover:scale-105 transition-transform duration-300">
                </div>

                <p class="mt-3 text-lg font-medium text-gray-800">
                    {{ producto.nombre }} - ${{ producto.precio_venta }}
                </p>

                <p class="text-sm text-gray-500">
                    {{ producto.descripcion }}
                </p>

                <a href="{{ url_for('ventas.venta_online') }}#prod-{{ producto.id_producto }}" class="inline-flex items-center gap-2 mt-2 text-white bg-[#814c59] hover:bg-[#C27C3A] focus:ring-4 focus:ring-[#e5cbb2] font-medium rounded-lg text-sm px-5 py-2.5 transition {{ 'opacity-40 pointer-events-none cursor-not-allowed' if producto.disponible_stock == 0 else '' }}">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                    Ordenar ahora
                </a>

            </div>
            {% endfor %}

        </div>

    </div>
</section>
{% endblock %}
