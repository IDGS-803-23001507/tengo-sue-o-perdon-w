<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Coffee - Restablecer contraseña</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <main class="mx-auto flex min-h-screen w-full max-w-xl items-center px-4 py-10">
        <section class="w-full rounded-lg border border-gray-200 bg-white p-8 shadow-[0_10px_30px_rgba(15,23,42,0.08)]">
            <h1 class="text-2xl font-bold text-gray-900">Restablecer contraseña</h1>
            <p class="mt-2 text-sm text-gray-500">Define una nueva contraseña para tu cuenta.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="mt-6 space-y-2">
                        {% for category, message in messages %}
                            <div class="rounded-md border px-3 py-2 text-sm {% if category == 'danger' %}border-red-200 bg-red-50 text-red-700{% elif category == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-700{% else %}border-blue-200 bg-blue-50 text-blue-700{% endif %}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" class="mt-6 space-y-4">
                {{ form.hidden_tag() }}
                <div>
                    <label for="contrasena" class="mb-2 block text-sm font-semibold text-gray-700">Nueva contraseña</label>
                    <input id="contrasena" name="contrasena" type="password" required minlength="8" class="block w-full rounded-md border border-gray-300 p-2.5 text-sm" placeholder="••••••••">
                </div>

                <div>
                    <label for="confirmarContrasena" class="mb-2 block text-sm font-semibold text-gray-700">Confirmar contraseña</label>
                    <input id="confirmarContrasena" name="confirmarContrasena" type="password" required minlength="8" class="block w-full rounded-md border border-gray-300 p-2.5 text-sm" placeholder="••••••••">
                </div>

                <button type="submit" class="w-full rounded-md bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white">Actualizar contraseña</button>
            </form>
        </section>
    </main>
</body>
</html>
