{% extends "layout/layout_produccion.html" %}

{% block container %}
<section class="bg-[#fdfcfb] min-h-screen flex items-center justify-center px-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-md border border-gray-100">

        <div class="p-8">

            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-[#F5E6D3] text-[#C27C3A] mb-4">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                              d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
                    </svg>
                </div>

                <h2 class="text-2xl font-semibold text-[#814c59]">
                    Finalizar cobro
                </h2>
                <p class="text-gray-500 text-sm">
                    Venta #{{ idVenta }}
                </p>
            </div>

            <!-- Total -->
            <div class="bg-[#814c59] rounded-xl p-6 mb-8 text-center">
                <p class="text-white/70 text-xs uppercase tracking-widest mb-1">
                    Total a pagar
                </p>
                <h3 class="text-white text-4xl font-semibold">
                    ${{ "{:,.2f}".format(total or 0) }}
                </h3>
            </div>

            <!-- Form -->
            <form method="POST" action="{{ url_for('ventas.pagar_venta_gestion', idVenta=idVenta) }}">
                {{ form.hidden_tag() }}

                <div class="space-y-4 mb-6">

                    <p class="text-xs font-semibold text-gray-400 uppercase">
                        Método de pago
                    </p>

                    <!-- EFECTIVO -->
                    <button type="submit" name="metodo_pago" value="Efectivo"
                        class="w-full flex items-center justify-between p-4 border border-gray-200 rounded-xl hover:border-[#C27C3A] hover:bg-[#FDF8F3] transition">

                        <div class="flex items-center gap-3">
                            <div class="p-2 bg-gray-100 rounded-lg">
                                <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                          d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2"/>
                                </svg>
                            </div>

                            <div class="text-left">
                                <p class="text-sm font-semibold text-gray-800">
                                    Efectivo
                                </p>
                                <p class="text-xs text-gray-400">
                                    Pago en caja
                                </p>
                            </div>
                        </div>

                        <span class="text-xs text-gray-400">Seleccionar</span>
                    </button>

                    <!-- TARJETA -->
                    <button type="button" onclick="mostrarReferencia()"
                        class="w-full flex items-center justify-between p-4 border border-gray-200 rounded-xl hover:border-[#C27C3A] hover:bg-[#FDF8F3] transition">

                        <div class="flex items-center gap-3">
                            <div class="p-2 bg-gray-100 rounded-lg">
                                <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                          d="M3 10h18M7 15h1m4 0h1"/>
                                </svg>
                            </div>

                            <div class="text-left">
                                <p class="text-sm font-semibold text-gray-800">
                                    Tarjeta
                                </p>
                                <p class="text-xs text-gray-400">
                                    Terminal bancaria
                                </p>
                            </div>
                        </div>

                        <span class="text-xs text-gray-400">Seleccionar</span>
                    </button>

                </div>

                <div id="seccionReferencia" class="hidden mb-6">

                    <button type="submit" name="metodo_pago" value="Tarjeta"
                        class="w-full mt-3 bg-[#C27C3A] text-white py-3 rounded-lg font-semibold hover:bg-[#814c59] transition">
                        Confirmar pago
                    </button>
                </div>

                <div class="mt-6">
                    <a href="{{ url_for('ventas.venta_fisica') }}"
                       class="text-sm text-gray-400 hover:text-red-500 transition">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>

</section>

<script>
function mostrarReferencia() {
    document.getElementById('seccionReferencia').classList.remove('hidden');
}
</script>
{% endblock %}
