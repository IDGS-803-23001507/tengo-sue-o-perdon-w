{% extends "layout/layout_produccion.html" %}

{% block container %}
<section class="bg-[#fdfcfb] min-h-screen flex items-center justify-center px-4">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-md border border-gray-100">
        <div class="p-8">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-semibold text-[#814c59]">Finalizar cobro</h2>
                <p class="text-gray-500 text-sm">Venta #{{ idVenta }}</p>
            </div>

            <div class="bg-[#814c59] rounded-xl p-6 mb-8 text-center">
                <p class="text-white/70 text-xs uppercase tracking-widest mb-1">Total a pagar</p>
                <h3 class="text-white text-4xl font-semibold" id="montoTotal" data-valor="{{ total }}">
                    ${{ "{:,.2f}".format(total or 0) }}
                </h3>
            </div>

            <form method="POST" action="{{ url_for('ventas.pagar_venta_gestion', idVenta=idVenta) }}">
                {{ form.hidden_tag() }}

                <div class="space-y-4 mb-6">
                    <p class="text-xs font-semibold text-gray-400 uppercase">Método de pago</p>

                    <div class="border border-gray-200 rounded-xl p-4 hover:border-[#C27C3A] transition">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="p-2 bg-green-100 rounded-lg text-green-600">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2"/>
                                </svg>
                            </div>
                            <p class="text-sm font-semibold text-gray-800">Efectivo</p>
                        </div>
                        
                        <div class="space-y-3">
                            <div>
                                <label class="text-[10px] text-gray-400 uppercase">¿Con cuánto paga el cliente?</label>
                                <input type="number" id="efectivoRecibido" step="0.01" placeholder="Ej. 200"
                                    class="w-full border-b-2 border-gray-100 focus:border-[#C27C3A] outline-none text-lg py-1">
                            </div>
                            
                            <div id="contenedorCambio" class="hidden bg-orange-50 p-3 rounded-lg flex justify-between items-center">
                                <span class="text-sm text-[#C27C3A] font-medium">Cambio:</span>
                                <span class="text-xl font-bold text-[#814c59]" id="montoCambio">$0.00</span>
                            </div>

                            <button type="submit" name="metodo_pago" value="Efectivo" id="btnPagarEfectivo"
                                class="w-full bg-[#C27C3A] text-white py-2 rounded-lg font-semibold opacity-50 cursor-not-allowed transition" disabled>
                                Cobrar en Efectivo
                            </button>
                        </div>
                    </div>

                    <button type="button" onclick="confirmarTarjeta()"
                        class="w-full flex items-center justify-between p-4 border border-gray-200 rounded-xl hover:border-[#C27C3A] transition">
                        <div class="flex items-center gap-3">
                            <div class="p-2 bg-gray-100 rounded-lg"><svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1"/></svg></div>
                            <div class="text-left">
                                <p class="text-sm font-semibold text-gray-800">Tarjeta</p>
                            </div>
                        </div>
                        <input type="radio" name="metodo_pago" id="radioTarjeta" value="Tarjeta" class="hidden">
                        <span class="text-xs text-blue-500">Usar Terminal</span>
                    </button>
                </div>

                <div id="seccionConfirmarTarjeta" class="hidden mb-6">
                    <button type="submit" name="metodo_pago" value="Tarjeta"
                        class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700">
                        Confirmar Transacción Bancaria
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>

<script>
const inputEfectivo = document.getElementById('efectivoRecibido');
const montoTotal = parseFloat(document.getElementById('montoTotal').dataset.valor);
const displayCambio = document.getElementById('montoCambio');
const contenedorCambio = document.getElementById('contenedorCambio');
const btnPagar = document.getElementById('btnPagarEfectivo');

inputEfectivo.addEventListener('input', () => {
    const recibido = parseFloat(inputEfectivo.value);
    
    if (recibido >= montoTotal) {
        const cambio = recibido - montoTotal;
        displayCambio.innerText = `$${cambio.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
        contenedorCambio.classList.remove('hidden');
        btnPagar.disabled = false;
        btnPagar.classList.remove('opacity-50', 'cursor-not-allowed');
    } else {
        contenedorCambio.classList.add('hidden');
        btnPagar.disabled = true;
        btnPagar.classList.add('opacity-50', 'cursor-not-allowed');
    }
});

function confirmarTarjeta() {
    document.getElementById('seccionConfirmarTarjeta').classList.remove('hidden');
}
</script>
{% endblock %}
