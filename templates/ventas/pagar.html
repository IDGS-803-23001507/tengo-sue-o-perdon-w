{% extends "layout/layout_produccion.html" %}

{% block container %}
<section class="bg-[#fdfcfb] min-h-screen flex items-center justify-center px-4 py-10">
    <div class="bg-white w-full max-w-md rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="p-8">
            <div class="text-center mb-8">
                <div class="inline-block p-3 bg-[#FDF8F3] rounded-2xl mb-3">
                    <img src="{{ url_for('static', filename='img/urbanCoffeeLogo.jpeg') }}" class="h-10 opacity-80">
                </div>
                <h2 class="text-2xl font-black text-[#4B3621] tracking-tight">Finalizar Cobro</h2>
                <p class="text-gray-400 text-xs uppercase tracking-widest font-bold">Venta #{{ idVenta }}</p>
            </div>

            <div class="bg-[#4B3621] rounded-2xl p-6 mb-8 text-center shadow-lg shadow-stone-200">
                <p class="text-white/60 text-[10px] uppercase font-black tracking-[0.2em] mb-1">Total a Pagar</p>
                <h3 class="text-white text-4xl font-black" id="montoTotal" data-valor="{{ total }}">
                    ${{ "{:,.2f}".format(total or 0) }}
                </h3>
            </div>

            <form method="POST" action="{{ url_for('ventas.pagar_venta_gestion', token=serializer.dumps(idVenta)) }}">
                {{ form.hidden_tag() }}
                
                <input type="hidden" name="pago_recibido" id="pago_recibido_hidden" value="0">
                <input type="hidden" name="cambio_calculado" id="cambio_calculado_hidden" value="0">

                <div class="space-y-4">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Selecciona Método</p>

                    <div class="group border-2 border-gray-100 rounded-2xl p-4 hover:border-[#C27C3A] transition-all">
                        <label class="flex items-center gap-3 mb-4 cursor-pointer">
                            <input type="radio" name="metodo_pago" value="Efectivo" id="radioEfectivo" class="w-4 h-4 text-[#C27C3A] focus:ring-[#C27C3A]" checked onclick="alternarMetodo('efectivo')">
                            <span class="text-sm font-bold text-gray-700">Efectivo</span>
                        </label>
                        
                        <div id="panelEfectivo" class="space-y-3">
                            <div>
                                <label class="text-[10px] text-gray-400 font-bold uppercase">¿Cuánto entrega el cliente?</label>
                                <div class="relative">
                                    <span class="absolute left-0 top-1 text-lg font-bold text-gray-400">$</span>
                                    <input type="number" id="efectivoRecibido" step="0.01" placeholder="0.00"
                                        class="w-full border-b-2 border-gray-100 focus:border-[#C27C3A] outline-none text-xl font-bold py-1 pl-5 transition-colors">
                                </div>
                            </div>
                            
                            <div id="contenedorCambio" class="hidden bg-[#FDF8F3] p-4 rounded-xl flex justify-between items-center border border-[#F5E6D3]">
                                <span class="text-xs text-[#8B5E3C] font-black uppercase">Cambio:</span>
                                <span class="text-2xl font-black text-[#4B3621]" id="montoCambio">$0.00</span>
                            </div>

                            <button type="submit" id="btnPagarEfectivo"
                                class="w-full bg-[#C27C3A] text-white py-3 rounded-xl font-black text-xs uppercase tracking-widest opacity-50 cursor-not-allowed transition-all shadow-md shadow-orange-100" disabled>
                                Completar Venta
                            </button>
                        </div>
                    </div>

                    <div class="group border-2 border-gray-100 rounded-2xl p-4 hover:border-blue-500 transition-all">
                        <label class="flex items-center gap-3 mb-4 cursor-pointer">
                            <input type="radio" name="metodo_pago" value="Tarjeta" id="radioTarjeta" class="w-4 h-4 text-blue-600 focus:ring-blue-500" onclick="alternarMetodo('tarjeta')">
                            <span class="text-sm font-bold text-gray-700">Tarjeta de Crédito / Débito</span>
                        </label>
                        
                        <div id="panelTarjeta" class="hidden space-y-4">
                            <div class="space-y-3">
                                <div class="bg-gray-50 p-3 rounded-lg border border-gray-200">
                                    <label class="text-[9px] text-gray-400 font-bold uppercase block mb-1">Número de Tarjeta</label>
                                    <input type="text" name="num_tarjeta" maxlength="16" placeholder="0000 0000 0000 0000" 
                                           class="w-full bg-transparent border-none outline-none text-sm font-mono tracking-widest">
                                </div>
                                <div class="flex gap-3">
                                    <div class="flex-1 bg-gray-50 p-3 rounded-lg border border-gray-200">
                                        <label class="text-[9px] text-gray-400 font-bold uppercase block mb-1">Vencimiento</label>
                                        <input type="text" placeholder="MM/AA" maxlength="5" class="w-full bg-transparent border-none outline-none text-sm font-mono">
                                    </div>
                                    <div class="flex-1 bg-gray-50 p-3 rounded-lg border border-gray-200">
                                        <label class="text-[9px] text-gray-400 font-bold uppercase block mb-1">CVV</label>
                                        <input type="password" maxlength="3" placeholder="***" class="w-full bg-transparent border-none outline-none text-sm font-mono">
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-xs uppercase tracking-widest shadow-md shadow-blue-100 hover:bg-blue-700 transition-all">
                                Procesar Pago Online
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>

<script>
// 1. Definimos todas las constantes correctamente
const inputEfectivo = document.getElementById('efectivoRecibido');
const montoTotal = parseFloat("{{ total }}") || 0;
const displayCambio = document.getElementById('montoCambio'); // Faltaba esta
const contenedorCambio = document.getElementById('contenedorCambio'); // Faltaba esta
const btnPagar = document.getElementById('btnPagarEfectivo');
const pHidden = document.getElementById('pago_recibido_hidden'); // Ojo con el ID exacto de tu HTML
const cHidden = document.getElementById('cambio_calculado_hidden');

inputEfectivo.addEventListener('input', () => {
    const recibido = parseFloat(inputEfectivo.value) || 0;
    
    // Debug en consola para que revises (Presiona F12 en el navegador)
    console.log("Recibido:", recibido, "Total:", montoTotal);

    if (recibido >= montoTotal && montoTotal > 0) {
        const cambio = recibido - montoTotal;
        
        // Actualizamos los valores que se enviarán a Python
        if(pHidden) pHidden.value = recibido.toFixed(2);
        if(cHidden) cHidden.value = cambio.toFixed(2);
        
        // Actualizamos la vista
        if(displayCambio) displayCambio.innerText = `$${cambio.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
        if(contenedorCambio) contenedorCambio.classList.remove('hidden');
        
        // HABILITAMOS EL BOTÓN
        btnPagar.disabled = false;
        btnPagar.classList.remove('opacity-50', 'cursor-not-allowed');
    } else {
        // MANTENEMOS BLOQUEADO
        btnPagar.disabled = true;
        btnPagar.classList.add('opacity-50', 'cursor-not-allowed');
        if(contenedorCambio) contenedorCambio.classList.add('hidden');
    }
});

function alternarMetodo(metodo) {
    const panelEfectivo = document.getElementById('panelEfectivo');
    const panelTarjeta = document.getElementById('panelTarjeta');
    
    if (metodo === 'efectivo') {
        panelEfectivo.classList.remove('hidden');
        panelTarjeta.classList.add('hidden');
    } else {
        panelEfectivo.classList.add('hidden');
        panelTarjeta.classList.remove('hidden');
    }
}
</script>
{% endblock %}
